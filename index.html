<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandrianiBlenkmann · Capacitaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --verde:#1F6C43;--verde-dark:#0d3d25;--verde-mid:#2d8a56;--verde-light:#e8f4ee;--verde-xlight:#f2faf6;
  --dorado:#C9A227;--dorado-light:#faf3e0;--dorado-dark:#8a6c10;
  --rojo:#c0392b;--rojo-light:#fdf0f0;
  --purpura:#7c5c9e;--purpura-light:#f0ebf8;
  --naranja:#c97a1a;--naranja-light:#fdf4e3;
  --azul:#2471a3;--azul-light:#eaf2fb;
  --gris:#5f6b7c;--gris-light:#f0f2f5;
  --text:#1a1a1a;--text2:#4a4a4a;--text3:#888;--text4:#bbb;
  --bg:#f5f6f4;--card:#ffffff;--border:#e0e5e2;--border2:#eef0ed;
  --r:10px;--r2:14px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.topbar{background:var(--verde-dark);padding:0 20px;height:56px;display:flex;align-items:center;gap:14px;position:fixed;top:0;left:0;right:0;z-index:200}
.lb-mark{width:36px;height:36px;border-radius:7px;background:white;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--verde-dark);flex-shrink:0}
.topbar-title{font-family:'Playfair Display',serif;color:white;font-size:15px;font-weight:600}
.topbar-sub{color:rgba(255,255,255,.4);font-size:10px;margin-top:1px}
.topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.nav-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.75);font-size:12px;padding:5px 13px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.18);color:white}
.nav-btn.active{background:var(--dorado);border-color:var(--dorado)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dorado);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#6fcf97}
.sync-dot.err{background:#eb5757}
.app{display:flex;height:100vh;padding-top:56px}
.sidebar{width:224px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto}
.search-wrap{padding:10px 10px 6px}
.search-input{width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none}
.search-input:focus{border-color:var(--verde)}
.sec-label{font-size:10px;font-weight:500;color:var(--text4);letter-spacing:.07em;text-transform:uppercase;padding:8px 12px 3px}
.agent-row{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.agent-row:hover{background:var(--verde-xlight)}
.agent-row.active{background:var(--verde-light);border-left-color:var(--verde)}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.agent-name-s{font-size:12px;font-weight:500;line-height:1.3}
.agent-id-s{font-size:10px;color:var(--text3)}
.cat-pip{width:6px;height:6px;border-radius:50%;margin-left:auto;flex-shrink:0}
.page{display:none;padding:20px}
.page.active{display:block}
.page.fullpage{padding:0}
.page.fullpage.active{display:flex;flex-direction:column;height:100%}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:12px;font-weight:500;color:var(--text2)}
.form-select,.form-input,.form-textarea{border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:13px;font-family:'DM Sans',sans-serif;background:white;color:var(--text);outline:none}
.form-select:focus,.form-input:focus{border-color:var(--verde)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-primary{background:var(--verde);color:white;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:var(--verde-mid)}
.btn-primary:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.btn-secondary{background:none;border:1px solid var(--border);border-radius:7px;padding:9px 16px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text2);transition:all .15s}
.btn-secondary:hover{border-color:var(--text3)}
.btn-danger{background:var(--rojo);color:white;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px}
.kpi-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;line-height:1}
.kpi-label{font-size:12px;color:var(--text2);margin-top:4px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:6px}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px}
.dash-card-title{font-size:13px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.dash-card-title-dot{width:7px;height:7px;border-radius:50%}
.cohorte-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2)}
.cohorte-row:last-child{border-bottom:none}
.cohorte-name{font-size:13px;font-weight:500;min-width:90px}
.cohorte-bar-wrap{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.cohorte-bar{height:100%;border-radius:3px;transition:width .8s ease}
.cohorte-pct{font-size:11px;color:var(--text3);min-width:32px;text-align:right}
.proxima-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border2)}
.proxima-row:last-child{border-bottom:none}
.prox-fecha{font-size:11px;font-weight:500;color:white;padding:3px 8px;border-radius:6px;min-width:60px;text-align:center;flex-shrink:0;line-height:1.4}
.prox-info{flex:1}
.prox-titulo{font-size:12px;font-weight:500}
.prox-sub{font-size:11px;color:var(--text3);margin-top:2px}
.alert-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border2);cursor:pointer}
.alert-row:last-child{border-bottom:none}
.alert-row:hover{opacity:.75}
.alert-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.alert-name{font-size:12px;font-weight:500;flex:1}
.alert-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}

/* FICHA */
.ficha-top{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 22px;display:flex;gap:16px;align-items:flex-start;margin-bottom:14px}
.ficha-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:600;flex-shrink:0}
.ficha-nombre{font-family:'Playfair Display',serif;font-size:19px;font-weight:600}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-c{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-n{font-family:'Playfair Display',serif;font-size:24px;font-weight:600}
.stat-l{font-size:11px;color:var(--text2);margin-top:2px}
.mini-bar{height:3px;background:var(--border2);border-radius:2px;margin-top:8px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px;transition:width .7s ease}
.fase-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.fase-hd{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.fase-pip{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fase-ttl{font-size:13px;font-weight:500;flex:1}
.fase-prog{font-size:11px;color:var(--text3);margin-right:5px}
.chev{font-size:10px;color:var(--text3);transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.fase-bd{padding:0 14px 10px;display:none}
.fase-bd.open{display:block}
.tema-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)}
.tema-row:last-child{border-bottom:none}
.t-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.t-check.done{background:var(--verde);border-color:var(--verde);color:white}
.t-check.pend-oblig{border-color:var(--dorado);border-style:dashed}
.t-nom{font-size:12px;flex:1}
.t-fecha{font-size:11px;color:var(--text3)}
.t-oblig{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--rojo-light);color:var(--rojo);font-weight:500}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.hist-ttl{font-size:13px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hist-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border2)}
.hist-row:last-child{border-bottom:none}
.h-fecha{font-size:11px;color:var(--text3);min-width:78px}
.h-tid{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;min-width:48px;text-align:center}
.h-nom{font-size:12px;color:var(--text2);flex:1}

/* CALENDARIO */
.cal-shell{display:flex;flex-direction:column;height:100%;background:var(--card)}
.cal-topbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cal-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;flex:1;text-transform:capitalize}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{background:var(--verde-light);border-color:var(--verde);color:var(--verde)}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);flex-shrink:0}
.cal-dow{padding:6px 4px;text-align:center;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border)}
.cal-body{flex:1;overflow-y:auto}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(90px,1fr)}
.cal-cell{border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);padding:4px;min-height:90px}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other-month{background:var(--bg);opacity:.4}
.cal-cell.today .cal-day-num{background:var(--verde);color:white;border-radius:50%}
.cal-day-num{font-size:11px;font-weight:500;color:var(--text2);width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;font-weight:500;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .15s}
.cal-ev:hover{opacity:.75}
.cal-ev.teo{background:#e8f4ee;color:#0d3d25}
.cal-ev.teo.realizado{background:#1F6C43;color:white}
.cal-ev.work{background:#c8e6d4;color:#0d3d25}
.cal-ev.work.realizado{background:#2d8a56;color:white}
.cal-ev.trent{background:#ede8f5;color:#4a3060}
.cal-ev.trent.realizado{background:#7c5c9e;color:white}
.cal-ev.feriado{background:#fdecea;color:#7b2020}
.cal-ev.sin-tema{background:#f5f5f0;color:#888;border:1px dashed #ccc}
.cal-legend{display:flex;gap:12px;padding:8px 14px;border-top:1px solid var(--border2);flex-shrink:0;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ASISTENCIA */
.asist-header{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 22px;margin-bottom:14px}
.asist-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:14px}
.agentes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px}
.ag-card{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:var(--r);border:2px solid var(--border);cursor:pointer;transition:all .15s;user-select:none}
.ag-card:hover{border-color:var(--verde-mid);background:var(--verde-xlight)}
.ag-card.selected{border-color:var(--verde);background:var(--verde-light)}
.ag-card-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.ag-card.selected .ag-card-check{background:var(--verde);border-color:var(--verde);color:white}
.save-row{margin-top:14px;display:flex;align-items:center;gap:12px}
.save-msg{font-size:12px;color:var(--text3)}
.save-msg.ok{color:var(--verde)}
.save-msg.err{color:var(--rojo)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--r2);padding:22px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;margin-bottom:14px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border2)}
.info-block{background:var(--bg);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.info-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.info-val{font-size:13px;font-weight:500}
.asist-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--verde-light);color:var(--verde-dark);margin:3px 2px;font-weight:500}
.estado-select{border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;background:white}
.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--verde-dark);color:white;padding:10px 18px;border-radius:9px;font-size:12px;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;max-width:280px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--rojo)}

@media(max-width:600px){
  .sidebar{width:100%;max-height:160px;border-right:none;border-bottom:1px solid var(--border)}
  .app{flex-direction:column}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .dash-row{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat-n{font-size:18px}
  .form-row{grid-template-columns:1fr}
}

/* EVALUACION */
.eval-grid{display:grid;grid-template-columns:1fr 380px;gap:16px;margin-bottom:16px}
.cuadrante-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.cuadrante-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:4px}
.cuadrante-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.chart-area{position:relative;width:100%;padding-bottom:100%;background:var(--bg);border-radius:var(--r);overflow:hidden}
.chart-inner{position:absolute;inset:0;padding:8px}
.chart-canvas{width:100%;height:100%}
.eval-panel{display:flex;flex-direction:column;gap:12px}
.eval-form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px}
.eval-form-title{font-size:13px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.score-label{font-size:12px;font-weight:500;color:var(--text2);min-width:130px}
.score-input{width:60px;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:14px;font-weight:500;text-align:center;font-family:'DM Sans',sans-serif;outline:none}
.score-input:focus{border-color:var(--verde)}
.score-bar-wrap{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.score-bar{height:100%;border-radius:3px;transition:width .4s ease}
.eval-hist-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;flex:1;overflow-y:auto;max-height:300px}
.eval-hist-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2);cursor:pointer}
.eval-hist-row:last-child{border-bottom:none}
.eval-hist-row:hover{opacity:.75}
.eval-chip{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;min-width:28px;text-align:center}
.quadrant-label{position:absolute;font-size:10px;font-weight:500;padding:3px 7px;border-radius:4px;pointer-events:none}
@media(max-width:700px){.eval-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="lb-mark">LB</div>
  <div><div class="topbar-title">LandrianiBlenkmann</div><div class="topbar-sub">Gestión de capacitaciones</div></div>
  <div class="topbar-right">
    <button class="nav-btn active" onclick="setPage('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="setPage('ficha',this)">Fichas</button>
    <button class="nav-btn" onclick="setPage('asistencia',this)">Asistencia</button>
    <button class="nav-btn" onclick="setPage('calendario',this)">Calendario</button>
    <button class="nav-btn" onclick="setPage('evaluacion',this)">Evaluación</button>
    <div class="sync-dot" id="sync-dot" title="Conectando..."></div>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="Buscar agente..." oninput="filterAgents(this.value)">
    </div>
    <div id="sidebar-list"><div style="padding:20px;text-align:center;font-size:12px;color:var(--text3)">Cargando...</div></div>
  </div>
  <div class="main">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">Cargando dashboard...</div>
    </div>
    <!-- FICHA -->
    <div class="page" id="page-ficha">
      <div style="text-align:center;padding:60px 20px;color:var(--text3)">
        <div style="font-size:32px;margin-bottom:10px">👤</div>
        <div style="font-size:14px;font-weight:500;color:var(--text2)">Seleccioná un agente</div>
        <div style="font-size:12px;margin-top:4px">para ver su ficha de progreso</div>
      </div>
    </div>
    <!-- ASISTENCIA -->
    <div class="page" id="page-asistencia">
      <div class="asist-header">
        <div class="asist-title">Registrar asistencia</div>
        <div class="form-row" style="margin-bottom:12px">
          <div class="form-group"><label class="form-label">Tema</label>
            <select class="form-select" id="sel-tema"></select></div>
          <div class="form-group"><label class="form-label">Fecha</label>
            <input type="date" class="form-input" id="inp-fecha" onchange="updateAsistPanel()"></div>
          <div class="form-group"><label class="form-label">Filtrar cohorte</label>
            <select class="form-select" id="sel-cohorte" onchange="updateAsistPanel()"><option value="">Todos</option></select></div>
          <div class="form-group"><label class="form-label">Tipo</label>
            <select class="form-select" id="sel-tipo"><option>Onboarding</option><option>Trent</option><option>Workshop</option></select></div>
        </div>

async function sheetPost(payload){

      method:'POST',
      mode:'cors',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(payload)
    });
  } catch(e){

}

function inferCohorte(fechaRaw){if(!fechaRaw)return '';const d=new Date(fechaRaw);if(isNaN(d))return '';return `AG-${String(d.getMonth()+1).padStart(2,'0')}${d.getFullYear()}`;}

function buildSidebar(agents){
  const cats=['Onboarding','En formación','Formado','Agente'];
  let html='';
  cats.forEach(cat=>{
    const g=agents.filter(a=>a.cat===cat&&a.estadoRel!=='Baja');
    if(!g.length)return;
    html+=`<div class="sec-label">${cat}</div>`;
    g.forEach(ag=>{
      const cc=CAT_CFG[ag.cat]||{bg:'#888'};
      html+=`<div class="agent-row${selectedAgent===ag.id?' active':''}" data-id="${ag.id}" onclick="showFicha('${ag.id}')">
        <div class="av" style="background:${cc.bg}22;color:${cc.bg}">${initials(ag.nombre)}</div>
        <div><div class="agent-name-s">${ag.nombre.split(' ').slice(0,2).join(' ')}</div><div class="agent-id-s">${ag.id}</div></div>
        <div class="cat-pip" style="background:${cc.bg}"></div>
      </div>`;
    });
  });
  document.getElementById('sidebar-list').innerHTML=html||'<div style="padding:16px;font-size:12px;color:var(--text3);text-align:center">Sin resultados</div>';
}
function filterAgents(q){buildSidebar(AGENTES.filter(a=>a.nombre.toLowerCase().includes(q.toLowerCase())||a.id.toLowerCase().includes(q.toLowerCase())));}

// ── DASHBOARD ──
function renderDashboard(){
  const activos=AGENTES.filter(a=>a.estadoRel!=='Baja');
  const cohortes=[...new Set(activos.filter(a=>a.cohorte).map(a=>a.cohorte))].sort().reverse();
  const obligs=TEMARIO.filter(t=>t.oblig);

  // KPIs
  const totalActivos=activos.length;
  const totalFormados=activos.filter(a=>a.cat==='Formado'||a.cat==='Agente').length;
  const conPendientes=activos.filter(a=>{
    const done=new Set((CAPS[a.id]||[]).map(c=>c.tema));
    return obligs.some(t=>!done.has(t.id));
  }).length;
  // Asistencia promedio última semana
  const hoy=new Date();
  const hace7=new Date(hoy);hace7.setDate(hace7.getDate()-7);
  let totalSesRecientes=0,totalAsistRecientes=0;
  // Count unique (fecha+tema) combos in last 7 days
  const sesRecientes=new Set();
  Object.values(CAPS).forEach(caps=>caps.forEach(c=>{
    const[d,m,y]=c.fecha.split('/');
    const fd=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
    if(fd>=hace7&&fd<=hoy){sesRecientes.add(c.fecha+'|'+c.tema);totalAsistRecientes++;}
  }));
  totalSesRecientes=sesRecientes.size;
  const promAsist=totalSesRecientes>0?Math.round(totalAsistRecientes/totalSesRecientes):0;

  // Progreso por cohorte
  const cohorteBars=cohortes.map(c=>{
    const ags=activos.filter(a=>a.cohorte===c);
    if(!ags.length)return '';
    const promPct=Math.round(ags.reduce((sum,a)=>{
      const done=new Set((CAPS[a.id]||[]).map(x=>x.tema));
      return sum+(TEMARIO.length?done.size/TEMARIO.length*100:0);
    },0)/ags.length);
    const color=promPct>=80?'var(--verde)':promPct>=50?'var(--dorado)':'var(--purpura)';
    return `<div class="cohorte-row">
      <div class="cohorte-name">${c}</div>
      <div style="font-size:11px;color:var(--text3);min-width:50px">${ags.length} agente${ags.length!==1?'s':''}</div>
      <div class="cohorte-bar-wrap"><div class="cohorte-bar" style="width:${promPct}%;background:${color}"></div></div>
      <div class="cohorte-pct">${promPct}%</div>
    </div>`;
  }).join('')||'<div style="font-size:12px;color:var(--text3)">Sin cohortes activos</div>';

  // Próximas sesiones esta semana
  const lun=new Date(hoy);lun.setDate(hoy.getDate()-(hoy.getDay()||7)+1);
  const dom=new Date(lun);dom.setDate(lun.getDate()+6);
  const proximasHTML=[];
  for(let i=0;i<7;i++){
    const d=new Date(lun);d.setDate(lun.getDate()+i);
    if(d<hoy) continue;
    const dow=d.getDay();
    const fechaStr=getFStr(d.getFullYear(),d.getMonth(),d.getDate());
    const feriado=FERIADOS.find(f=>f.fecha===fechaStr);
    if(feriado) continue;
    const diaLabel=DIAS_S[dow];
    if(dow===4){// Jueves
      getCohortes().forEach(c=>{
        const ini=c.mes+c.anio*12,cur=d.getMonth()+d.getFullYear()*12;
        if(cur>=ini&&cur<=ini+1){
          const ses=SESIONES.find(s=>s.fecha===fechaStr&&s.tipo==='Teo');
          const tema=ses?TEMARIO.find(t=>t.id===ses.temaId):null;
          proximasHTML.push(`<div class="proxima-row">
            <div class="prox-fecha" style="background:var(--verde)">${diaLabel}<br>${d.getDate()}/${d.getMonth()+1}</div>
            <div class="prox-info"><div class="prox-titulo">Teórico · ${c.id}</div><div class="prox-sub">${tema?tema.nombre:'Sin tema asignado'}</div></div>
          </div>`);
        }
      });
    }
    if(dow===5){// Viernes
      getCohortes().forEach(c=>{
        const ini=c.mes+c.anio*12,cur=d.getMonth()+d.getFullYear()*12;
        if(cur>=ini&&cur<=ini+1){
          const ses=SESIONES.find(s=>s.fecha===fechaStr&&s.tipo==='Workshop');
          const tema=ses?TEMARIO.find(t=>t.id===ses.temaId):null;
          proximasHTML.push(`<div class="proxima-row">
            <div class="prox-fecha" style="background:var(--verde-mid)">${diaLabel}<br>${d.getDate()}/${d.getMonth()+1}</div>
            <div class="prox-info"><div class="prox-titulo">Workshop · ${c.id}</div><div class="prox-sub">${tema?tema.nombre:'Sin tema asignado'}</div></div>
          </div>`);
        }
      });
    }
    if(dow===3){// Miércoles
      const trent=TRENTS.find(t=>t.fecha===fechaStr);
      const tema=trent?TEMARIO.find(t=>t.id===trent.temaId):null;
      proximasHTML.push(`<div class="proxima-row">
        <div class="prox-fecha" style="background:var(--purpura)">Mié<br>${d.getDate()}/${d.getMonth()+1}</div>
        <div class="prox-info"><div class="prox-titulo">Trent</div><div class="prox-sub">${tema?tema.nombre:'Sin tema asignado'}</div></div>
      </div>`);
    }
  }

  // Agentes con obligatorios pendientes
  const pendientesHTML=activos
    .filter(a=>a.cat==='Onboarding'||a.cat==='En formación')
    .map(a=>{
      const done=new Set((CAPS[a.id]||[]).map(c=>c.tema));
      const pend=obligs.filter(t=>!done.has(t.id)).length;
      if(!pend)return '';
      const cc=CAT_CFG[a.cat]||{bg:'#888'};
      return `<div class="alert-row" onclick="showFicha('${a.id}')">
        <div class="alert-av" style="background:${cc.bg}22;color:${cc.bg}">${initials(a.nombre)}</div>
        <div class="alert-name">${a.nombre.split(' ').slice(0,2).join(' ')}</div>
        <span class="alert-badge" style="background:var(--rojo-light);color:var(--rojo)">${pend} pendiente${pend!==1?'s':''}</span>
      </div>`;
    }).filter(Boolean).join('')||'<div style="font-size:12px;color:var(--verde);padding:8px 0">✓ Todos al día con los obligatorios</div>';

  document.getElementById('page-dashboard').innerHTML=`
    <div class="dash-grid">
      <div class="kpi-card"><div class="kpi-num" style="color:var(--verde)">${totalActivos}</div><div class="kpi-label">Agentes activos</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:var(--purpura)">${cohortes.length}</div><div class="kpi-label">Cohortes activos</div><div class="kpi-sub">${cohortes.join(' · ')||'—'}</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:var(--rojo)">${conPendientes}</div><div class="kpi-label">Con obligatorios pendientes</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:var(--dorado)">${promAsist}</div><div class="kpi-label">Promedio asistencia</div><div class="kpi-sub">últimos 7 días</div></div>
    </div>
    <div class="dash-row">
      <div class="dash-card">
        <div class="dash-card-title"><div class="dash-card-title-dot" style="background:var(--verde)"></div>Progreso por cohorte</div>
        ${cohorteBars}
      </div>
      <div class="dash-card">
        <div class="dash-card-title"><div class="dash-card-title-dot" style="background:var(--purpura)"></div>Esta semana</div>
        ${proximasHTML.length?proximasHTML.join(''):'<div style="font-size:12px;color:var(--text3)">Sin sesiones esta semana</div>'}
      </div>

function guardarAsist(temaId,fecha){

  const fechaFmt=isoToF(fecha);

  toast(`✓ Asistencia guardada para ${nuevos.length} agente${nuevos.length!==1?'s':''}`);

}

// ── CALENDARIO ──
function getCohortes(){return[...new Set(AGENTES.filter(a=>a.cohorte&&a.estadoRel!=='Baja').map(a=>a.cohorte))].map(c=>({id:c,mes:parseInt(c.slice(3,5))-1,anio:parseInt(c.slice(5))}));}

// Detect if a past day had sessions from CAPS data
function getAsistenciasEnFecha(fechaStr){
  const map={};// temaId -> [agentIds]
  Object.entries(CAPS).forEach(([agId,caps])=>{
    caps.forEach(c=>{if(c.fecha===fechaStr){if(!map[c.tema])map[c.tema]=[];map[c.tema].push(agId);}});
  });
  return map;
}

function getEventsForDay(y,m,d){
  const fechaStr=getFStr(y,m,d),dow=new Date(y,m,d).getDay(),events=[];
  const feriado=FERIADOS.find(f=>f.fecha===fechaStr);
  if(feriado){events.push({tipo:'feriado',label:'Feriado: '+feriado.motivo,fecha:fechaStr,feriado});return events;}
  const asistMap=getAsistenciasEnFecha(fechaStr);
  const hoy=new Date();const esPasado=new Date(y,m,d)<new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate());

  if(dow===4){
    getCohortes().forEach(c=>{
      const ini=c.mes+c.anio*12,cur=m+y*12;
      if(cur>=ini&&cur<=ini+1){
        const ses=SESIONES.find(s=>s.fecha===fechaStr&&s.tipo==='Teo'&&s.cohorte===c.id);
        const tema=ses?TEMARIO.find(t=>t.id===ses.temaId):null;
        // Check if there's attendance data for this day
        const temasDelDia=Object.keys(asistMap);
        const temaRealizado=temasDelDia.find(tid=>TEMARIO.find(t=>t.id===tid&&t.fase==='2. Negocio'));
        const realizado=esPasado&&(ses||temaRealizado);
        const label=tema?`Teórico · ${tema.nombre}`:temaRealizado?`Teórico · ${TEMARIO.find(t=>t.id===temaRealizado)?.nombre||temaRealizado}`:'Teórico';
        events.push({tipo:'teo',label,fecha:fechaStr,cohorte:c.id,sesion:ses||null,sinTema:!ses&&!temaRealizado,realizado,asistMap});
      }
    });
  }
  if(dow===5){
    getCohortes().forEach(c=>{
      const ini=c.mes+c.anio*12,cur=m+y*12;
      if(cur>=ini&&cur<=ini+1){
        const ses=SESIONES.find(s=>s.fecha===fechaStr&&s.tipo==='Workshop'&&s.cohorte===c.id);
        const tema=ses?TEMARIO.find(t=>t.id===ses.temaId):null;
        const realizado=esPasado&&(ses||Object.keys(asistMap).length>0);
        events.push({tipo:'work',label:tema?`Workshop · ${tema.nombre}`:'Workshop',fecha:fechaStr,cohorte:c.id,sesion:ses||null,sinTema:!ses&&!realizado,realizado,asistMap});
      }
    });
  }
  if(dow===3){
    const trent=TRENTS.find(t=>t.fecha===fechaStr);
    const tema=trent?TEMARIO.find(t=>t.id===trent.temaId):null;
    const temaRealizado=trent?Object.keys(asistMap).find(id=>id===trent.temaId):null;
    const realizado=esPasado&&(trent||Object.keys(asistMap).length>0);
    events.push({tipo:'trent',label:tema?`Trent · ${tema.nombre}`:'Trent',fecha:fechaStr,trent:trent||null,sinTema:!trent&&!realizado,realizado,asistMap});
  }
  return events;
}

function renderCalendar(){
  const y=calYear,m=calMonth;
  const firstDow=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  const hoy=new Date();
  const dowHTML=DIAS_S.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  let gridHTML='';
  for(let i=0;i<firstDow;i++)gridHTML+=`<div class="cal-cell other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isHoy=hoy.getDate()===d&&hoy.getMonth()===m&&hoy.getFullYear()===y;
    const events=getEventsForDay(y,m,d);
    const evHTML=events.map(e=>{
      const cls=e.tipo==='feriado'?'feriado':e.tipo==='teo'?'teo':e.tipo==='work'?'work':'trent';
      const realCls=e.realizado?' realizado':'';
      const sinCls=e.sinTema&&!e.realizado?' sin-tema':'';
      const ds=encodeURIComponent(JSON.stringify(e));
      return `<div class="cal-ev ${cls}${realCls}${sinCls}" onclick="showDayModal('${ds}')" title="${e.label}">${e.label}</div>`;
    }).join('');
    gridHTML+=`<div class="cal-cell${isHoy?' today':''}"><div class="cal-day-num">${d}</div>${evHTML}</div>`;
  }
  const rem=(firstDow+daysInMonth)%7===0?0:7-(firstDow+daysInMonth)%7;
  for(let i=0;i<rem;i++)gridHTML+=`<div class="cal-cell other-month"></div>`;
  document.getElementById('cal-shell').innerHTML=`
    <div class="cal-topbar">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <div class="cal-title">${MESES[m]} ${y}</div>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      <button class="btn-secondary" style="font-size:12px;padding:5px 12px;margin-left:8px" onclick="showAddFeriado()">+ Feriado</button>
      <button class="btn-primary" style="font-size:12px;padding:5px 12px" onclick="showAddTrent()">+ Trent</button>
    </div>
    <div class="cal-dow-row">${dowHTML}</div>
    <div class="cal-body"><div class="cal-grid">${gridHTML}</div></div>
    <div class="cal-legend">
      <div class="leg-item"><div class="leg-dot" style="background:#1F6C43"></div>Realizado</div>
      <div class="leg-item"><div class="leg-dot" style="background:#e8f4ee;border:1px solid #9dcbb3"></div>Teórico programado</div>
      <div class="leg-item"><div class="leg-dot" style="background:#ede8f5;border:1px solid #b8a8d8"></div>Trent programado</div>
      <div class="leg-item"><div class="leg-dot" style="background:#f5f5f0;border:1px dashed #ccc"></div>Sin tema</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fdecea"></div>Feriado</div>
    </div>`;
}
function calNav(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

function showDayModal(ds){
  const e=JSON.parse(decodeURIComponent(ds));
  const tema=e.sesion?TEMARIO.find(t=>t.id===e.sesion.temaId):e.trent?TEMARIO.find(t=>t.id===e.trent.temaId):null;
  // Asistentes: buscar en CAPS por fecha
  const asistentes=AGENTES.filter(ag=>(CAPS[ag.id]||[]).some(c=>{
    if(c.fecha!==e.fecha)return false;
    if(e.trent)return c.tema===e.trent.temaId;
    if(e.sesion)return c.tema===e.sesion.temaId;
    // fallback: any cap on that date
    return true;
  }));
  // Deduplicate by date only if no specific tema
  const asistChips=asistentes.length
    ?asistentes.map(a=>`<span class="asist-chip">${initials(a.nombre)} ${a.nombre.split(' ')[0]}</span>`).join('')
    :'<div style="font-size:12px;color:var(--text3)">Sin asistencia registrada</div>';
  let html=`<div class="modal-title">${e.tipo==='teo'?'Teórico':e.tipo==='work'?'Workshop':e.tipo==='trent'?'Trent':'Feriado'}</div>
    <div class="info-block"><div class="info-label">Fecha</div><div class="info-val">${e.fecha}</div></div>`;
  if(e.cohorte)html+=`<div class="info-block"><div class="info-label">Cohorte</div><div class="info-val">${e.cohorte}</div></div>`;
  if(tema)html+=`<div class="info-block"><div class="info-label">Tema</div><div class="info-val">${tema.nombre}</div></div>`;
  if(e.feriado)html+=`<div class="info-block"><div class="info-label">Motivo</div><div class="info-val">${e.feriado.motivo}</div></div>`;
  if(e.tipo!=='feriado')html+=`<div class="info-block"><div class="info-label">Asistentes (${asistentes.length})</div><div style="margin-top:6px">${asistChips}</div></div>`;
  const editBtn=e.tipo==='trent'?`<button class="btn-secondary" onclick="closeModal();showAddTrent('${e.fecha}')">Editar</button>`:
    (e.tipo==='teo'||e.tipo==='work')?`<button class="btn-secondary" onclick="closeModal();showEditSesion('${e.fecha}','${e.tipo}','${e.cohorte||''}')">Editar</button>`:'';
  html+=`<div class="modal-footer">${editBtn}<button class="btn-primary" onclick="closeModal()">Cerrar</button></div>`;
  openModal(html);
}

function showEditSesion(fecha,tipo,cohorte){
  const temaOpts=TEMARIO.map(t=>`<option value="${t.id}">${t.id} · ${t.nombre}</option>`).join('');
  const sesExist=SESIONES.find(s=>s.fecha===fecha&&s.tipo===(tipo==='teo'?'Teo':'Workshop')&&s.cohorte===cohorte);
  openModal(`<div class="modal-title">${tipo==='teo'?'Teórico':'Workshop'} — ${fecha}</div>
    <div class="info-block" style="margin-bottom:10px"><div class="info-label">Cohorte</div><div class="info-val">${cohorte}</div></div>
    <div class="form-group" style="margin-bottom:10px"><label class="form-label">Tema</label>
      <select class="form-select" id="ses-tema"><option value="">— Seleccionar —</option>${temaOpts}<option value="__nuevo__">＋ Agregar nuevo tema</option></select></div>
    <div class="form-group"><label class="form-label">Notas</label><input type="text" class="form-input" id="ses-notas" value="${sesExist?sesExist.notas:''}" placeholder="Opcional"></div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="guardarSesion('${fecha}','${tipo}','${cohorte}')">Guardar</button></div>`);
  if(sesExist)document.getElementById('ses-tema').value=sesExist.temaId;
  document.getElementById('ses-tema').onchange=function(){if(this.value==='__nuevo__')showAddTema(this);};
}
function guardarSesion(fecha,tipo,cohorte){
  const temaId=document.getElementById('ses-tema').value,notas=document.getElementById('ses-notas').value;
  if(!temaId||temaId==='__nuevo__'){alert('Seleccioná un tema');return;}
  const tipoKey=tipo==='teo'?'Teo':'Workshop',uid=Math.random().toString(36).slice(2,10);
  SESIONES=SESIONES.filter(s=>!(s.fecha===fecha&&s.tipo===tipoKey&&s.cohorte===cohorte));
  SESIONES.push({id:uid,fecha,tipo:tipoKey,cohorte,temaId,notas});
  sheetPost({rows:[[uid,fecha,tipoKey,cohorte,temaId,notas]],sheet:'Calendario_Sesiones'});
  closeModal();renderCalendar();toast('✓ Sesión actualizada');
}

function showAddTrent(fechaPre){
  const temaOpts=TEMARIO.map(t=>`<option value="${t.id}">${t.id} · ${t.nombre}</option>`).join('');
  const isoF=fechaPre?fToIso(fechaPre):'';
  const ex=fechaPre?TRENTS.find(t=>t.fecha===fechaPre):null;
  openModal(`<div class="modal-title">Trent</div>
    <div class="form-group" style="margin-bottom:10px"><label class="form-label">Fecha (miércoles)</label><input type="date" class="form-input" id="tr-fecha" value="${isoF}"></div>
    <div class="form-group" style="margin-bottom:10px"><label class="form-label">Tema</label>
      <select class="form-select" id="tr-tema"><option value="">— Seleccionar —</option>${temaOpts}<option value="__nuevo__">＋ Agregar nuevo tema</option></select></div>
    <div class="form-group"><label class="form-label">Notas</label><input type="text" class="form-input" id="tr-notas" value="${ex?ex.notas:''}" placeholder="Opcional"></div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="guardarTrent()">Guardar</button></div>`);
  if(ex)document.getElementById('tr-tema').value=ex.temaId;
  document.getElementById('tr-tema').onchange=function(){if(this.value==='__nuevo__')showAddTema(this);};
}
function guardarTrent(){
  const iso=document.getElementById('tr-fecha').value,temaId=document.getElementById('tr-tema').value,notas=document.getElementById('tr-notas').value;
  if(!iso||!temaId||temaId==='__nuevo__'){alert('Completá fecha y tema');return;}
  const fecha=isoToF(iso),uid=Math.random().toString(36).slice(2,10);
  TRENTS=TRENTS.filter(t=>t.fecha!==fecha);
  TRENTS.push({id:uid,fecha,temaId,notas});
  sheetPost({rows:[[uid,fecha,temaId,notas]],sheet:'Calendario_Trents'});
  closeModal();renderCalendar();toast('✓ Trent guardado');
}

function showAddFeriado(){
  openModal(`<div class="modal-title">Feriado / Cancelación</div>
    <div class="form-group" style="margin-bottom:10px"><label class="form-label">Fecha</label><input type="date" class="form-input" id="fer-fecha"></div>
    <div class="form-group"><label class="form-label">Motivo</label><input type="text" class="form-input" id="fer-motivo" placeholder="Ej: Feriado nacional"></div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="guardarFeriado()">Guardar</button></div>`);
}
function guardarFeriado(){
  const iso=document.getElementById('fer-fecha').value,motivo=document.getElementById('fer-motivo').value.trim()||'Feriado';
  if(!iso){alert('Seleccioná fecha');return;}
  const fecha=isoToF(iso),uid=Math.random().toString(36).slice(2,10);
  FERIADOS=FERIADOS.filter(f=>f.fecha!==fecha);
  FERIADOS.push({id:uid,fecha,motivo});
  sheetPost({rows:[[uid,fecha,motivo]],sheet:'Calendario_Feriados'});
  closeModal();renderCalendar();toast('✓ Feriado marcado');
}


// ════════════════════════════════════
//  EVALUACIÓN
// ════════════════════════════════════
let EVALUACIONES = []; // [{id,agId,comercial,bdr,fecha,evaluador}]
let evalAgSelected = null;
let chartHoverIdx = -1;

async function loadEvaluaciones(){
  try{
    const rows = await sheetGet('Evaluaciones!A2:F');
    EVALUACIONES = rows.filter(r=>r[0]).map(r=>({
      id:r[0], agId:r[1], comercial:parseFloat(r[2])||0,
      bdr:parseFloat(r[3])||0, fecha:r[4]||'', evaluador:r[5]||''
    }));
  } catch(e){ EVALUACIONES=[]; }
}

function getLastEval(agId){
  const evals = EVALUACIONES.filter(e=>e.agId===agId);
  if(!evals.length) return null;
  return evals.sort((a,b)=>b.fecha.localeCompare(a.fecha))[0];
}

function renderEvaluacion(){
  const activos = AGENTES.filter(a=>a.estadoRel!=='Baja');
  // Build agent list with last scores
  const agListHTML = activos.map(ag=>{
    const last = getLastEval(ag.id);
    const cc = CAT_CFG[ag.cat]||{bg:'#888'};
    return `<div class="agent-row${evalAgSelected===ag.id?' active':''}" 
      data-id="${ag.id}" 
      style="border-left:3px solid ${evalAgSelected===ag.id?'var(--verde)':'transparent'}"
      onclick="selectEvalAg('${ag.id}')">
      <div class="av" style="background:${cc.bg}22;color:${cc.bg}">${initials(ag.nombre)}</div>
      <div style="flex:1">
        <div class="agent-name-s">${ag.nombre.split(' ').slice(0,2).join(' ')}</div>
        <div class="agent-id-s">${ag.id}</div>
      </div>
      ${last?`<div style="font-size:10px;color:var(--text3)">${last.comercial}/${last.bdr}</div>`:'<div style="font-size:10px;color:var(--text4)">—</div>'}
    </div>`;
  }).join('');

  // Cuadrante data — last eval per agent
  const points = activos.map(ag=>{
    const last = getLastEval(ag.id);
    if(!last) return null;
    return {ag, c:last.comercial, b:last.bdr};
  }).filter(Boolean);

  document.getElementById('page-evaluacion').innerHTML = `
    <div style="display:flex;gap:0;height:100%">
      <!-- Mini sidebar agentes -->
      <div style="width:200px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);overflow-y:auto">
        <div class="sec-label" style="padding-top:12px">Agentes</div>
        ${agListHTML}
      </div>
      <!-- Main eval content -->
      <div style="flex:1;overflow-y:auto;padding:20px">
        <div class="eval-grid">
          <!-- CUADRANTE -->
          <div class="cuadrante-wrap">
            <div class="cuadrante-title">Matriz de capacidad</div>
            <div class="cuadrante-sub">Último puntaje por agente · clic para ver historial</div>
            <canvas id="eval-canvas" style="width:100%;aspect-ratio:1;border-radius:8px;cursor:crosshair"></canvas>
          </div>
          <!-- PANEL DERECHO -->
          <div class="eval-panel">
            <!-- FORM -->
            <div class="eval-form-card">
              <div class="eval-form-title">
                <div style="width:7px;height:7px;border-radius:50%;background:var(--verde)"></div>
                ${evalAgSelected ? AGENTES.find(a=>a.id===evalAgSelected)?.nombre.split(' ').slice(0,2).join(' ') : 'Seleccioná un agente'}
              </div>
              ${evalAgSelected ? buildEvalForm(evalAgSelected) : '<div style="font-size:12px;color:var(--text3)">Hacé clic en un agente de la lista o en el gráfico</div>'}
            </div>
            <!-- HISTORIAL -->
            <div class="eval-hist-card">
              <div style="font-size:13px;font-weight:500;margin-bottom:10px">Historial de evaluaciones</div>
              ${buildEvalHist(evalAgSelected)}
            </div>
          </div>
        </div>
      </div>
    </div>`;

  // Draw chart after DOM ready
  setTimeout(()=>drawCuadrante(points), 50);
}

function buildEvalForm(agId){
  const last = getLastEval(agId);
  const c = last?last.comercial:5, b = last?last.bdr:5;
  return `
    <div class="score-row">
      <span class="score-label">Comercial (Y)</span>
      <input type="number" class="score-input" id="ev-comercial" min="1" max="10" value="${c}" oninput="updateScoreBars()">
      <div class="score-bar-wrap"><div class="score-bar" id="bar-c" style="width:${c*10}%;background:var(--verde)"></div></div>
    </div>
    <div class="score-row">
      <span class="score-label">Base de Relaciones (X)</span>
      <input type="number" class="score-input" id="ev-bdr" min="1" max="10" value="${b}" oninput="updateScoreBars()">
      <div class="score-bar-wrap"><div class="score-bar" id="bar-b" style="width:${b*10}%;background:var(--purpura)"></div></div>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label class="form-label">Evaluador</label>
      <input type="text" class="form-input" id="ev-evaluador" placeholder="Tu nombre" style="font-size:12px;padding:6px 10px">
    </div>
    <button class="btn-primary" style="width:100%;font-size:12px" onclick="guardarEval('${agId}')">Guardar evaluación</button>`;
}

function buildEvalHist(agId){
  if(!agId) return '<div style="font-size:12px;color:var(--text3)">Seleccioná un agente</div>';
  const evals = EVALUACIONES.filter(e=>e.agId===agId).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(!evals.length) return '<div style="font-size:12px;color:var(--text3)">Sin evaluaciones aún</div>';
  return evals.map(e=>{
    const quad = getQuadrant(e.comercial, e.bdr);
    return `<div class="eval-hist-row">
      <span style="font-size:11px;color:var(--text3);min-width:80px">${e.fecha}</span>
      <span class="eval-chip" style="background:${quad.bg};color:${quad.color}">C:${e.comercial}</span>
      <span class="eval-chip" style="background:${quad.bg};color:${quad.color}">B:${e.bdr}</span>
      <span style="font-size:11px;color:var(--text2);flex:1">${quad.nombre}</span>
    </div>`;
  }).join('');
}

function getQuadrant(c, b){
  if(c>=5 && b>=5) return {nombre:'Estrella',bg:'#e8f4ee',color:'#0d3d25'};
  if(c>=5 && b<5)  return {nombre:'Potencial',bg:'#faf3e0',color:'#7a5800'};
  if(c<5  && b>=5) return {nombre:'Relacionista',bg:'#f0ebf8',color:'#4a3060'};
  return {nombre:'En desarrollo',bg:'#fdecea',color:'#7b2020'};
}

function updateScoreBars(){
  const c = parseFloat(document.getElementById('ev-comercial')?.value)||0;
  const b = parseFloat(document.getElementById('ev-bdr')?.value)||0;
  const bc = document.getElementById('bar-c');
  const bb = document.getElementById('bar-b');
  if(bc) bc.style.width = Math.min(10,Math.max(0,c))*10+'%';
  if(bb) bb.style.width = Math.min(10,Math.max(0,b))*10+'%';
}

function guardarEval(agId){
  const c = parseFloat(document.getElementById('ev-comercial').value);
  const b = parseFloat(document.getElementById('ev-bdr').value);
  const ev = document.getElementById('ev-evaluador').value.trim();
  if(isNaN(c)||isNaN(b)||c<1||c>10||b<1||b>10){ toast('Puntajes deben ser entre 1 y 10','err'); return; }
  const fecha = new Date().toISOString().split('T')[0];
  const uid = Math.random().toString(36).slice(2,10);
  EVALUACIONES.push({id:uid, agId, comercial:c, bdr:b, fecha, evaluador:ev});
  sheetPost({rows:[[uid,agId,c,b,fecha,ev]], sheet:'Evaluaciones'});
  toast('✓ Evaluación guardada');
  renderEvaluacion();
}

function selectEvalAg(agId){
  evalAgSelected = agId;
  renderEvaluacion();
}

// ── CANVAS CHART ──
function drawCuadrante(points){
  const canvas = document.getElementById('eval-canvas');
  if(!canvas) return;
  const dpr = window.devicePixelRatio||1;
  const size = canvas.offsetWidth;
  canvas.width = size*dpr;
  canvas.height = size*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const pad = 36;
  const w = size - pad*2;
  const h = size - pad*2;

  // Background quadrants
  const quads = [
    {x:0,  y:0,  w:0.5,h:0.5, color:'#fdecea', label:'En desarrollo'},// low c, low b (bottom-left in data = top-left inverted)
    {x:0.5,y:0,  w:0.5,h:0.5, color:'#faf3e0', label:'Potencial'},    // high c, low b
    {x:0,  y:0.5,w:0.5,h:0.5, color:'#f0ebf8', label:'Relacionista'}, // low c, high b
    {x:0.5,y:0.5,w:0.5,h:0.5, color:'#e8f4ee', label:'Estrella'},     // high c, high b
  ];
  quads.forEach(q=>{
    ctx.fillStyle = q.color;
    ctx.fillRect(pad+q.x*w, pad+q.y*h, q.w*w, q.h*h);
  });

  // Grid lines
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 0.5;
  for(let i=1;i<=9;i++){
    const x = pad + (i/10)*w;
    const y = pad + (i/10)*h;
    ctx.beginPath(); ctx.moveTo(x,pad); ctx.lineTo(x,pad+h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(pad+w,y); ctx.stroke();
  }

  // Center dividers (bold)
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad+w*0.5,pad); ctx.lineTo(pad+w*0.5,pad+h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad,pad+h*0.5); ctx.lineTo(pad+w,pad+h*0.5); ctx.stroke();

  // Quadrant labels
  ctx.font = '10px DM Sans, sans-serif';
  ctx.fillStyle = '#999';
  ctx.textAlign = 'center';
  ctx.fillText('En desarrollo', pad+w*0.25, pad+h*0.97);
  ctx.fillText('Potencial',     pad+w*0.75, pad+h*0.97);
  ctx.fillStyle = '#bbb';
  ctx.fillText('Relacionista',  pad+w*0.25, pad+h*0.5-6);
  ctx.fillText('Estrella',      pad+w*0.75, pad+h*0.5-6);

  // Axis labels
  ctx.fillStyle = '#888'; ctx.font = '10px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  for(let i=1;i<=10;i++){
    const x = pad + (i/10)*w - w/20;
    ctx.fillText(i, x, pad+h+14);
  }
  ctx.textAlign = 'right';
  for(let i=1;i<=10;i++){
    const y = pad + h - (i/10)*h + h/20;
    ctx.fillText(i, pad-4, y+3);
  }

  // Axis titles
  ctx.fillStyle = '#555'; ctx.font = '11px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Base de Relaciones', pad+w/2, size-2);
  ctx.save(); ctx.translate(12, pad+h/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Comercial', 0, 0); ctx.restore();

  // Points
  points.forEach((p,i)=>{
    const x = pad + (p.b/10)*w - w/20 + w/20;
    const y = pad + h - (p.c/10)*h + h/20 - h/20;
    const px = pad + ((p.b-0.5)/10)*w + w/20;
    const py = pad + h - ((p.c-0.5)/10)*h + h/20 - h/20;
    // Correct position: map 1-10 linearly within the chart
    const cx = pad + ((p.b-1)/9)*w;
    const cy = pad + h - ((p.c-1)/9)*h;
    const isSelected = evalAgSelected===p.ag.id;
    const cc = CAT_CFG[p.ag.cat]||{bg:'#888'};

    // Glow for selected
    if(isSelected){
      ctx.beginPath(); ctx.arc(cx,cy,12,0,Math.PI*2);
      ctx.fillStyle = cc.bg+'44'; ctx.fill();
    }

    // Circle
    ctx.beginPath(); ctx.arc(cx,cy,isSelected?8:6,0,Math.PI*2);
    ctx.fillStyle = cc.bg; ctx.fill();
    ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();

    // Initials
    ctx.fillStyle = 'white'; ctx.font = `bold ${isSelected?8:7}px DM Sans`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(initials(p.ag.nombre), cx, cy);

    // Label on hover (selected)
    if(isSelected){
      const label = p.ag.nombre.split(' ')[0];
      ctx.fillStyle = '#333'; ctx.font = '10px DM Sans';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText(label, cx, cy-10);
    }
  });

  // Click handler
  canvas.onclick = function(e){
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX-rect.left);
    const my = (e.clientY-rect.top);
    let hit = null, minD = 20;
    points.forEach(p=>{
      const cx = pad + ((p.b-1)/9)*w;
      const cy = pad + h - ((p.c-1)/9)*h;
      const d = Math.sqrt((mx-cx)**2+(my-cy)**2);
      if(d<minD){minD=d;hit=p;}
    });
    if(hit){ selectEvalAg(hit.ag.id); }
  };
}

function setPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(btn)btn.classList.add('active');
  if(page==='calendario')renderCalendar();
  if(page==='dashboard')renderDashboard();
  if(page==='evaluacion'){renderEvaluacion();}
  if(page==='asistencia'){const t=new Date().toISOString().split('T')[0];if(!document.getElementById('inp-fecha').value)document.getElementById('inp-fecha').value=t;}
}

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('inp-fecha').value=new Date().toISOString().split('T')[0];
  loadAll();
});
</script>
