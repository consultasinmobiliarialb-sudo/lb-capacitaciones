<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandrianiBlenkmann · Capacitaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --verde:#1F6C43;--verde-dark:#0d3d25;--verde-mid:#2d8a56;--verde-light:#e8f4ee;--verde-xlight:#f2faf6;
  --dorado:#C9A227;--dorado-light:#faf3e0;--dorado-dark:#8a6c10;
  --rojo:#c0392b;--rojo-light:#fdf0f0;
  --purpura:#7c5c9e;--purpura-light:#f0ebf8;
  --naranja:#c97a1a;--naranja-light:#fdf4e3;
  --text:#1a1a1a;--text2:#4a4a4a;--text3:#888;--text4:#bbb;
  --bg:#f5f6f4;--card:#ffffff;--border:#e0e5e2;--border2:#eef0ed;
  --r:10px;--r2:14px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px}

/* ───── TOPBAR ───── */
.topbar{
  background:var(--verde-dark);
  padding:0 20px;height:58px;
  display:flex;align-items:center;gap:14px;
  position:fixed;top:0;left:0;right:0;z-index:200;
}
.lb-mark{
  width:38px;height:38px;border-radius:8px;
  background:white;display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:17px;font-weight:600;
  color:var(--verde-dark);letter-spacing:-1px;flex-shrink:0;
}
.topbar-title{font-family:'Playfair Display',serif;color:white;font-size:16px;font-weight:600}
.topbar-sub{color:rgba(255,255,255,.45);font-size:11px;margin-top:1px}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.nav-btn{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.8);font-size:12px;padding:6px 14px;border-radius:20px;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;
}
.nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.18);color:white;border-color:rgba(255,255,255,.3)}
.nav-btn.active{background:var(--dorado);border-color:var(--dorado);color:white}
.sync-badge{font-size:11px;padding:4px 10px;border-radius:20px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)}
.sync-badge.ok{color:#6fcf97;border-color:rgba(111,207,151,.3)}
.sync-badge.err{color:#eb5757;border-color:rgba(235,87,87,.3)}
.sync-badge.loading{color:var(--dorado);border-color:rgba(201,162,39,.3)}

/* ───── LAYOUT ───── */
.app{display:flex;height:100vh;padding-top:58px}
.sidebar{
  width:230px;flex-shrink:0;
  background:var(--card);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;
}
.main{flex:1;overflow-y:auto}

/* ───── SIDEBAR ───── */
.search-wrap{padding:12px 12px 8px}
.search-input{
  width:100%;border:1px solid var(--border);border-radius:8px;
  padding:7px 11px;font-size:13px;font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);outline:none;
}
.search-input:focus{border-color:var(--verde)}
.sec-label{
  font-size:10px;font-weight:500;color:var(--text4);
  letter-spacing:.08em;text-transform:uppercase;
  padding:10px 14px 4px;
}
.agent-row{
  display:flex;align-items:center;gap:9px;
  padding:7px 12px;cursor:pointer;transition:background .12s;
  border-left:3px solid transparent;
}
.agent-row:hover{background:var(--verde-xlight)}
.agent-row.active{background:var(--verde-light);border-left-color:var(--verde)}
.av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;flex-shrink:0;
}
.agent-name-s{font-size:12px;font-weight:500;line-height:1.3}
.agent-id-s{font-size:10px;color:var(--text3)}
.cat-pip{width:6px;height:6px;border-radius:50%;margin-left:auto;flex-shrink:0}

/* ───── PAGES ───── */
.page{display:none;padding:22px}
.page.active{display:block}

/* ─ FICHA ─ */
.ficha-top{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:20px 24px;
  display:flex;gap:18px;align-items:flex-start;margin-bottom:16px;
}
.ficha-av{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:20px;font-weight:600;flex-shrink:0;
}
.ficha-nombre{font-family:'Playfair Display',serif;font-size:20px;font-weight:600}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.stat-c{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 18px;
}
.stat-n{font-family:'Playfair Display',serif;font-size:26px;font-weight:600}
.stat-l{font-size:12px;color:var(--text2);margin-top:2px}
.mini-bar{height:4px;background:var(--border2);border-radius:2px;margin-top:10px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px;transition:width .7s ease}

.fase-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.fase-hd{padding:12px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.fase-pip{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.fase-ttl{font-size:13px;font-weight:500;flex:1}
.fase-prog{font-size:12px;color:var(--text3);margin-right:6px}
.chev{font-size:10px;color:var(--text3);transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.fase-bd{padding:0 16px 12px;display:none}
.fase-bd.open{display:block}
.tema-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border2)}
.tema-row:last-child{border-bottom:none}
.t-check{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;
}
.t-check.done{background:var(--verde);border-color:var(--verde);color:white}
.t-check.pend-oblig{border-color:var(--dorado);border-style:dashed}
.t-nom{font-size:13px;flex:1;color:var(--text)}
.t-fecha{font-size:11px;color:var(--text3)}
.t-oblig{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--rojo-light);color:var(--rojo);font-weight:500}

.hist-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.hist-ttl{font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.hist-row{display:flex;align-items:center;gap:11px;padding:7px 0;border-bottom:1px solid var(--border2)}
.hist-row:last-child{border-bottom:none}
.h-fecha{font-size:11px;color:var(--text3);min-width:82px}
.h-tid{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;min-width:52px;text-align:center}
.h-nom{font-size:12px;color:var(--text2);flex:1}
.h-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ─ ASISTENCIA ─ */
.asist-header{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px 24px;margin-bottom:16px}
.asist-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:500;color:var(--text2)}
.form-select,.form-input{
  border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;
  background:white;color:var(--text);outline:none;
}
.form-select:focus,.form-input:focus{border-color:var(--verde)}
.btn-primary{
  background:var(--verde);color:white;border:none;
  border-radius:8px;padding:10px 22px;font-size:13px;font-weight:500;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s;
}
.btn-primary:hover{background:var(--verde-mid)}
.btn-primary:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}

.sesion-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px 24px}
.sesion-title{font-size:14px;font-weight:500;margin-bottom:6px}
.sesion-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.agentes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.ag-check-card{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:var(--r);border:2px solid var(--border);
  cursor:pointer;transition:all .15s;user-select:none;
}
.ag-check-card:hover{border-color:var(--verde-mid);background:var(--verde-xlight)}
.ag-check-card.selected{border-color:var(--verde);background:var(--verde-light)}
.ag-check-icon{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;
  flex-shrink:0;transition:all .15s;
}
.ag-check-card.selected .ag-check-icon{background:var(--verde);border-color:var(--verde);color:white}
.ag-card-name{font-size:13px;font-weight:500}
.ag-card-id{font-size:11px;color:var(--text3)}

.save-row{margin-top:18px;display:flex;align-items:center;gap:14px}
.save-msg{font-size:13px;color:var(--text3)}
.save-msg.ok{color:var(--verde)}
.save-msg.err{color:var(--rojo)}

/* ─ EMPTY / LOADING ─ */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.loading-state{text-align:center;padding:60px 20px;color:var(--text3)}
.spinner{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--verde);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─ TOAST ─ */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--verde-dark);color:white;
  padding:12px 20px;border-radius:10px;font-size:13px;
  opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;
  max-width:300px;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--rojo)}

/* MOBILE */
@media(max-width:600px){
  .sidebar{width:100%;height:auto;flex-shrink:0;border-right:none;border-bottom:1px solid var(--border);max-height:200px}
  .app{flex-direction:column}
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat-n{font-size:20px}
  .form-row{grid-template-columns:1fr}
  .page{padding:14px}
  .topbar-title{font-size:14px}
  .nav-btn{font-size:11px;padding:5px 10px}
}

/* ─ CALENDARIO ─ */
.cal-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)}
.cal-nav-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;flex:1;text-transform:capitalize}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{background:var(--verde-light);border-color:var(--verde);color:var(--verde)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{padding:8px 4px;text-align:center;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border2);background:var(--bg)}
.cal-cell{min-height:90px;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);padding:6px;position:relative;vertical-align:top}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other-month{background:var(--bg);opacity:.5}
.cal-cell.today{background:var(--verde-xlight)}
.cal-cell.today .cal-day-num{background:var(--verde);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-event{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;font-weight:500;line-height:1.4;transition:opacity .15s}
.cal-event:hover{opacity:.8}
.cal-event.onboarding-teo{background:#e8f4ee;color:#0d3d25}
.cal-event.onboarding-work{background:#d0eadb;color:#0d3d25}
.cal-event.trent{background:#f0ebf8;color:#4a3060}
.cal-legend{display:flex;gap:16px;padding:12px 20px;border-top:1px solid var(--border2);flex-wrap:wrap}
.cal-leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.cal-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--r2);padding:24px;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.btn-secondary{background:none;border:1px solid var(--border);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text2);transition:all .15s}
.btn-secondary:hover{border-color:var(--text3)}
.modal-event-info{background:var(--bg);border-radius:var(--r);padding:14px;margin-bottom:12px}
.modal-event-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.modal-event-val{font-size:14px;font-weight:500}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="lb-mark">LB</div>
  <div>
    <div class="topbar-title">LandrianiBlenkmann</div>
    <div class="topbar-sub">Gestión de capacitaciones</div>
  </div>
  <div class="topbar-right">
    <button class="nav-btn active" onclick="setPage('ficha')">Fichas</button>
    <button class="nav-btn" onclick="setPage('asistencia')">Asistencia</button>
    <button class="nav-btn" onclick="setPage('calendario')">Calendario</button>
    <span class="sync-badge loading" id="sync-badge">⟳ Conectando...</span>
  </div>
</div>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="Buscar agente..." oninput="filterAgents(this.value)" id="search-input">
    </div>
    <div id="sidebar-list">
      <div class="loading-state" style="padding:20px">
        <div class="spinner"></div>
        <div style="font-size:12px">Cargando agentes...</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- FICHA PAGE -->
    <div class="page active" id="page-ficha">
      <div class="empty-state">
        <div class="empty-icon">👤</div>
        <div style="font-size:14px;font-weight:500;color:var(--text2)">Seleccioná un agente</div>
        <div style="font-size:12px;margin-top:4px">para ver su ficha de progreso</div>
      </div>
    </div>

    <!-- ASISTENCIA PAGE -->
    <div class="page" id="page-asistencia">
      <div class="asist-header">
        <div class="asist-title">Registrar asistencia</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Tema / Capacitación</label>
            <select class="form-select" id="sel-tema" onchange="updateSesionPanel()">
              <option value="">— Seleccionar tema —</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Fecha</label>
            <input type="date" class="form-input" id="inp-fecha" onchange="updateSesionPanel()">
          </div>
          <div class="form-group">
            <label class="form-label">Tipo de sesión</label>
            <select class="form-select" id="sel-tipo">
              <option value="Onboarding">Onboarding (Cohorte)</option>
              <option value="Trent">Trent (General)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Cohorte</label>
            <select class="form-select" id="sel-cohorte">
              <option value="">Todos los activos</option>
              <option value="AG-012026">AG-012026</option>
              <option value="AG-102025">AG-102025</option>
              <option value="AG-092025">AG-092025</option>
            </select>
          </div>
        </div>
      </div>

      <div class="sesion-card" id="sesion-panel">
        <div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">
          Seleccioná un tema y una fecha para ver los agentes disponibles
        </div>
      </div>
    </div>
  </div>

    <!-- CALENDARIO PAGE -->
    <div class="page" id="page-calendario">
      <div id="cal-container"></div>
      <div id="trent-form-wrap"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
      <div class="modal" id="modal-content"></div>
    </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

async function sheetGet(range){
  const url = `${BASE}/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const r = await fetch(url);
  if(!r.ok) throw new Error('Sheet read error '+r.status);
  const d = await r.json();
  return d.values||[];
}

async function sheetAppend(range, values){
  const r = await fetch(SCRIPT_URL, {
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({rows: values})
  });
  // no-cors returns opaque response, assume ok
  return {ok: true};
}

//  LOAD DATA
// ═══════════════════════════════════════════
async function loadData(){
  setSyncBadge('loading','⟳ Cargando...');
  try {
    // Agentes
    const agRows = await sheetGet('Base de Agentes!A2:L');
    AGENTES = agRows
      .filter(r => r[0] && r[10]==='Activo')
      .map(r => ({
        id:     r[0]||'',
        nombre: r[1]||'',
        dni:    r[2]||'',
        ingreso:r[3]||'',
        cat:    r[7]||'Agente',
        mentor: r[8]||'',
        zona:   r[9]||'',
        cohorte: inferCohorte(r[3]||''),
      }));

    // Capacitaciones
    const capRows = await sheetGet('Registro_Capacitaciones!A2:E');
    CAPS = {};
    capRows.forEach(r => {
      if(!r[1]) return;
      if(!CAPS[r[1]]) CAPS[r[1]]=[];
      CAPS[r[1]].push({
        id:    r[0]||'',
        tema:  r[2]||'',
        fecha: formatFecha(r[3]||''),
        estado:r[4]||'Asistió',
      });
    });

    buildSidebar(AGENTES);
    buildTemaSelect();
    await loadTrents();
    setSyncBadge('ok','✓ Conectado');
    toast('Datos cargados correctamente','ok');
  } catch(e){
    setSyncBadge('err','✗ Sin conexión');
    toast('No se pudo conectar al Sheet. Verificá que esté compartido.','err');
    // Fallback con datos del xlsx
    loadFallback();
  }
}

function inferCohorte(fechaRaw){
  if(!fechaRaw) return '';
  const d = new Date(fechaRaw);
  if(isNaN(d)) return '';
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = d.getFullYear();
  return `AG-${mm}${yy}`;
}

function formatFecha(raw){
  if(!raw) return '';
  if(raw.includes('/')) return raw;
  const d = new Date(raw);
  if(isNaN(d)) return raw;
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function buildSidebar(agents){
  const cats = ['Onboarding','En formación','Agente'];
  let html = '';
  cats.forEach(cat=>{
    const grupo = agents.filter(a=>a.cat===cat);
    if(!grupo.length) return;
    const label = cat==='En formación'?'En formación':cat;
    html += `<div class="sec-label">${label}</div>`;
    grupo.forEach(ag=>{
      const cc = CAT_CFG[ag.cat]||{bg:'#888',text:'white'};
      const isActive = selectedAgent===ag.id ? ' active':'';
      html += `<div class="agent-row${isActive}" data-id="${ag.id}" onclick="showFicha('${ag.id}')">
        <div class="av" style="background:${cc.bg}22;color:${cc.bg}">${initials(ag.nombre)}</div>
        <div>
          <div class="agent-name-s">${ag.nombre.split(' ').slice(0,2).join(' ')}</div>
          <div class="agent-id-s">${ag.id}</div>
        </div>
        <div class="cat-pip" style="background:${cc.bg}"></div>
      </div>`;
    });
  });
  document.getElementById('sidebar-list').innerHTML = html || '<div style="padding:20px;font-size:12px;color:var(--text3);text-align:center">Sin resultados</div>';
}

function showFicha(id){

  document.querySelectorAll('.agent-row').forEach(el=>{
    el.classList.toggle('active', el.dataset.id===id);

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-ficha').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active', i===0);
  });

  const ag = AGENTES.find(a=>a.id===id);
  if(!ag) return;
  const caps = CAPS[id]||[];
  const capSet = new Set(caps.map(c=>c.tema));
  const capMap = {};
  caps.forEach(c=>capMap[c.tema]=c.fecha);

  const total = TEMARIO.length;
  const hechos = TEMARIO.filter(t=>capSet.has(t.id)).length;
  const obligs = TEMARIO.filter(t=>t.oblig);
  const obligH = obligs.filter(t=>capSet.has(t.id)).length;
  const pct = Math.round(hechos/total*100);
  const cc = CAT_CFG[ag.cat]||{bg:'#888',text:'white'};

  // FASES HTML
  const fasesHTML = ['2. Negocio','4. Técnica','5. Expansión'].map(f=>{
    const tf = TEMARIO.filter(t=>t.fase===f);
    const hf = tf.filter(t=>capSet.has(t.id)).length;
    const fc = FASE_CFG[f];
    const tRows = tf.map(t=>{
      const done = capSet.has(t.id);
      return `<div class="tema-row">
        <div class="t-check ${done?'done':t.oblig?'pend-oblig':''}">${done?'✓':''}</div>
        <div class="t-nom">${t.nombre}</div>
        ${t.oblig&&!done?`<span class="t-oblig">Obligatorio</span>`:''}
        ${done?`<span class="t-fecha">${capMap[t.id]}</span>`:''}
      </div>`;
    }).join('');
    return `<div class="fase-card">
      <div class="fase-hd" onclick="toggleFase(this)">
        <div class="fase-pip" style="background:${fc.dot}"></div>
        <span class="fase-ttl" style="color:${fc.dot}">${f}</span>
        <span class="fase-prog">${hf}/${tf.length}</span>

      </div>
      <div class="fase-bd">
        <div style="height:4px;background:var(--border2);border-radius:2px;margin-bottom:12px;overflow:hidden">
          <div style="height:100%;width:${Math.round(hf/tf.length*100)}%;background:${fc.dot};border-radius:2px"></div>
        </div>
        ${tRows}
      </div>
    </div>`;
  }).join('');

  // HISTORIAL
  const histOrd = [...caps].sort((a,b)=>b.fecha.split('/').reverse().join('').localeCompare(a.fecha.split('/').reverse().join('')));
  const histHTML = histOrd.length ? histOrd.map(c=>{
    const t = TEMARIO.find(x=>x.id===c.tema);
    const fc = t?FASE_CFG[t.fase]:{dot:'#888'};
    return `<div class="hist-row">
      <span class="h-fecha">${c.fecha}</span>
      <span class="h-tid" style="background:${fc.dot}20;color:${fc.dot}">${c.tema}</span>
      <span class="h-nom">${t?t.nombre:'—'}</span>
      <span class="h-pip" style="background:${fc.dot}"></span>
    </div>`;
  }).join('') : '<div style="font-size:12px;color:var(--text3);padding:8px 0">Sin capacitaciones registradas aún</div>';

  // Tag clase
  const tagCls = ag.cat==='Onboarding'?'style="background:#e8f4ee;color:#1F6C43"':
                 ag.cat==='En formación'?'style="background:#f0ebf8;color:#7c5c9e"':
                 'style="background:#fdf4e3;color:#c97a1a"';

  document.getElementById('page-ficha').innerHTML = `
    <div class="ficha-top">
      <div class="ficha-av" style="background:${cc.bg}18;color:${cc.bg}">${initials(ag.nombre)}</div>
      <div style="flex:1">
        <div class="ficha-nombre">${ag.nombre}</div>
        <div class="tags">
          <span class="tag" ${tagCls}>${ag.cat}</span>
          ${ag.cohorte?`<span class="tag" style="background:var(--dorado-light);color:var(--dorado-dark)">${ag.cohorte}</span>`:''}
          <span class="tag" style="background:var(--bg);color:var(--text3);border:1px solid var(--border)">${ag.id}</span>
          ${ag.zona?`<span class="tag" style="background:var(--bg);color:var(--text3);border:1px solid var(--border)">${ag.zona}</span>`:''}
        </div>
      </div>
      <button class="btn-primary" style="font-size:12px;padding:7px 14px" onclick="goAsistencia()">+ Asistencia</button>
    </div>

    <div class="stats-grid">
      <div class="stat-c">
        <div class="stat-n" style="color:var(--verde)">${hechos}</div>
        <div class="stat-l">Temas completados</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%;background:var(--verde)"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">${pct}% del total</div>
      </div>
      <div class="stat-c">
        <div class="stat-n" style="color:${obligH<obligs.length?'var(--rojo)':'var(--verde)'}">${obligH}/${obligs.length}</div>
        <div class="stat-l">Obligatorios</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${Math.round(obligH/obligs.length*100)}%;background:${obligH<obligs.length?'var(--rojo)':'var(--verde)'}"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">${obligs.length-obligH} pendiente${obligs.length-obligH!==1?'s':''}</div>
      </div>
      <div class="stat-c">
        <div class="stat-n" style="color:var(--dorado)">${caps.length}</div>
        <div class="stat-l">Sesiones asistidas</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${Math.min(100,Math.round(caps.length/total*100))}%;background:var(--dorado)"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">de ${total} posibles</div>
      </div>
    </div>

    <div style="margin-bottom:16px">${fasesHTML}</div>

    <div class="hist-card">
      <div class="hist-ttl">
        <span style="width:8px;height:8px;background:var(--verde);border-radius:50%;display:inline-block"></span>
        Historial de capacitaciones
      </div>
      ${histHTML}
    </div>
  `;
}

function buildTemaSelect(){
  const sel = document.getElementById('sel-tema');
  const fases = ['2. Negocio','4. Técnica','5. Expansión'];
  let html = '<option value="">— Seleccionar tema —</option>';
  fases.forEach(f=>{
    const temas = TEMARIO.filter(t=>t.fase===f);
    html += `<optgroup label="${f}">`;
    temas.forEach(t=>{
      html += `<option value="${t.id}">${t.id} · ${t.nombre}</option>`;
    });
    html += '</optgroup>';
  });
  sel.innerHTML = html;
}

function updateSesionPanel(){
  const temaId  = document.getElementById('sel-tema').value;
  const fecha   = document.getElementById('inp-fecha').value;
  const cohorte = document.getElementById('sel-cohorte').value;
  if(!temaId || !fecha){
    document.getElementById('sesion-panel').innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">Seleccioná un tema y una fecha para ver los agentes disponibles</div>';
    return;
  }
  const tema = TEMARIO.find(t=>t.id===temaId);
  let agentes = AGENTES.filter(a=>a.cat!=='Baja');
  if(cohorte) agentes = agentes.filter(a=>a.cohorte===cohorte);

  selectedAsist = new Set();

  // Pre-seleccionar si ya tienen el tema (para saber quién ya lo hizo)
  const yaHicieron = new Set(agentes.filter(a=>{
    const caps = CAPS[a.id]||[];
    return caps.some(c=>c.tema===temaId);
  }).map(a=>a.id));

  const cards = agentes.map(ag=>{
    const cc = CAT_CFG[ag.cat]||{bg:'#888'};
    const yaLo = yaHicieron.has(ag.id);
    return `<div class="ag-check-card${yaLo?' selected':''}" data-id="${ag.id}" onclick="toggleAgente(this,'${ag.id}')">
      <div class="ag-check-icon">${yaLo?'✓':''}</div>
      <div>
        <div class="ag-card-name">${ag.nombre.split(' ').slice(0,2).join(' ')}</div>
        <div class="ag-card-id">${ag.id} · <span style="color:${cc.bg}">${ag.cat}</span>${yaLo?' · <span style="color:var(--verde);font-size:10px">ya registrado</span>':''}</div>
      </div>
    </div>`;
  }).join('');

  // Init selectedAsist with pre-selected (already done)
  yaHicieron.forEach(id=>selectedAsist.add(id));

  const fechaFmt = formatFechaDisplay(fecha);
  document.getElementById('sesion-panel').innerHTML = `
    <div class="sesion-title">${tema.nombre}</div>
    <div class="sesion-sub">${fechaFmt} · ${agentes.length} agente${agentes.length!==1?'s':''} disponibles · Los marcados ya tienen este tema registrado</div>
    <div class="agentes-grid">${cards||'<div style="color:var(--text3);font-size:13px">No hay agentes en este filtro</div>'}</div>
    <div class="save-row">
      <button class="btn-primary" onclick="guardarAsistencia('${temaId}','${fecha}')">Guardar asistencia</button>
      <span class="save-msg" id="save-msg"></span>
    </div>
  `;
}

function formatFechaDisplay(iso){
  const [y,m,d] = iso.split('-');
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const date = new Date(iso+'T12:00:00');
  return `${dias[date.getDay()]} ${d} de ${meses[parseInt(m)-1]} ${y}`;
}

function toggleAgente(el, id){
  el.classList.toggle('selected');
  const icon = el.querySelector('.ag-check-icon');
  if(el.classList.contains('selected')){
    selectedAsist.add(id);
    icon.textContent='✓';
  } else {
    selectedAsist.delete(id);
    icon.textContent='';
  }
}

async function guardarAsistencia(temaId, fecha){
  const btn = document.querySelector('.save-row .btn-primary');
  const msg = document.getElementById('save-msg');
  if(!selectedAsist.size){
    msg.className='save-msg err';
    msg.textContent='Seleccioná al menos un agente';
    return;
  }
  btn.disabled=true;
  msg.className='save-msg';
  msg.textContent='Guardando...';

  const fechaFmt = (() => {
    const [y,m,d] = fecha.split('-');
    return `${d}/${m}/${y}`;
  })();

  // Filtrar solo los que NO tienen ya este tema (evitar duplicados)
  const nuevos = [...selectedAsist].filter(id=>{
    const caps = CAPS[id]||[];
    return !caps.some(c=>c.tema===temaId);
  });

  if(!nuevos.length){
    msg.className='save-msg';
    msg.textContent='Todos los seleccionados ya tienen este tema registrado';
    btn.disabled=false;
    return;
  }

  const rows = nuevos.map(id=>{
    const uid = Math.random().toString(36).slice(2,10);
    return [uid, id, temaId, fechaFmt, 'Asistió'];
  });

  // Con no-cors disparamos el fetch sin esperar respuesta
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify({rows: rows})
  }).catch(()=>{});

  // Actualizar estado local inmediatamente
  rows.forEach(r=>{
    if(!CAPS[r[1]]) CAPS[r[1]]=[];
    CAPS[r[1]].push({id:r[0],tema:r[2],fecha:r[3],estado:r[4]});
  });
  msg.className='save-msg ok';
  msg.textContent='✓ ' + nuevos.length + ' registro' + (nuevos.length!==1?'s':'') + ' guardado' + (nuevos.length!==1?'s':'');
  toast('✓ Asistencia enviada para ' + nuevos.length + ' agente' + (nuevos.length!==1?'s':''), 'ok');
  btn.disabled=false;
  setTimeout(()=>updateSesionPanel(), 800);
}


// ═══════════════════════════════════════════
//  CALENDARIO
// ═══════════════════════════════════════════
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed
let TRENTS   = []; // [{id, fecha, temaId, notas}]

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

// Cohortes activos — se infiere desde AGENTES
function getCohortes(){
  const set = new Set(AGENTES.filter(a=>a.cohorte).map(a=>a.cohorte));
  return [...set].map(c=>{
    // AG-012026 → mes=1, año=2026
    const m = parseInt(c.slice(3,5))-1;
    const y = parseInt(c.slice(5));
    return {id:c, mes:m, anio:y};
  });
}

// Genera eventos del mes
function getEventosDelMes(year, month){
  const eventos = [];
  const diasEnMes = new Date(year, month+1, 0).getDate();
  const cohortes = getCohortes();

  for(let d=1; d<=diasEnMes; d++){
    const fecha = new Date(year, month, d);
    const dow = fecha.getDay(); // 0=dom,1=lun,...,4=jue,5=vie,3=mié

    // ONBOARDING — Jueves (4) teórico y Viernes (5) workshop
    if(dow === 4 || dow === 5){
      cohortes.forEach(c=>{
        // Cohorte activo durante el mes de inicio y el siguiente
        const inicioMes = c.mes + c.anio*12;
        const mesMostrar = month + year*12;
        if(mesMostrar >= inicioMes && mesMostrar <= inicioMes+1){
          eventos.push({
            fecha: `${String(d).padStart(2,'0')}/${String(month+1).padStart(2,'0')}/${year}`,
            dia: d,
            tipo: dow===4 ? 'onboarding-teo' : 'onboarding-work',
            label: dow===4 ? `Onboarding · ${c.id}` : `Workshop · ${c.id}`,
            cohorte: c.id,
            sesion: dow===4 ? 'Teórico' : 'Workshop',
          });
        }
      });
    }

    // TRENTS — Miércoles (3)
    if(dow === 3){
      const fechaStr = `${String(d).padStart(2,'0')}/${String(month+1).padStart(2,'0')}/${year}`;
      const trent = TRENTS.find(t=>t.fecha===fechaStr);
      eventos.push({
        fecha: fechaStr,
        dia: d,
        tipo: 'trent',
        label: trent ? `Trent · ${trent.temaId}` : 'Trent · Sin definir',
        trent: trent||null,
        esMiercoles: true,
      });
    }
  }
  return eventos;
}

function renderCalendario(){
  const container = document.getElementById('cal-container');
  if(!container) return;

  const year = calYear, month = calMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const diasEnMes = new Date(year, month+1, 0).getDate();
  const eventos = getEventosDelMes(year, month);
  const hoy = new Date();

  // Group events by day
  const byDay = {};
  eventos.forEach(e=>{ if(!byDay[e.dia]) byDay[e.dia]=[]; byDay[e.dia].push(e); });

  // Day headers
  let gridHTML = DIAS.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // Empty cells before month start
  for(let i=0; i<firstDay; i++){
    gridHTML += `<div class="cal-cell other-month"></div>`;
  }

  // Days
  for(let d=1; d<=diasEnMes; d++){
    const isHoy = hoy.getDate()===d && hoy.getMonth()===month && hoy.getFullYear()===year;
    const dayEvs = byDay[d]||[];
    const evHTML = dayEvs.map(e=>`
      <div class="cal-event ${e.tipo}" onclick="showEventModal(${JSON.stringify(e).replace(/"/g,'&quot;')})" title="${e.label}">
        ${e.label}
      </div>`).join('');
    gridHTML += `<div class="cal-cell${isHoy?' today':''}">
      <div class="cal-day-num">${d}</div>
      ${evHTML}
    </div>`;
  }

  // Fill remaining cells
  const totalCells = firstDay + diasEnMes;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for(let i=0; i<remaining; i++){
    gridHTML += `<div class="cal-cell other-month"></div>`;
  }

  container.innerHTML = `
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrev()">‹</button>
        <div class="cal-nav-title">${MESES[month]} ${year}</div>
        <button class="cal-nav-btn" onclick="calNext()">›</button>
        <button class="btn-primary" style="font-size:12px;padding:7px 14px" onclick="showAddTrent()">+ Trent</button>
      </div>
      <div class="cal-grid">${gridHTML}</div>
      <div class="cal-legend">
        <div class="cal-leg-item"><div class="cal-leg-dot" style="background:#e8f4ee;border:1px solid #b8d9c8"></div>Teórico (jueves)</div>
        <div class="cal-leg-item"><div class="cal-leg-dot" style="background:#d0eadb;border:1px solid #9dcbb3"></div>Workshop (viernes)</div>
        <div class="cal-leg-item"><div class="cal-leg-dot" style="background:#f0ebf8;border:1px solid #c9b8e8"></div>Trent (miércoles)</div>
      </div>
    </div>
  `;
}

function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendario(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendario(); }

// ─ MODAL ─
function showEventModal(e){
  const tema = e.temaId ? TEMARIO.find(t=>t.id===e.temaId) : null;
  let html = `<div class="modal-title">${e.sesion||'Trent'}</div>
    <div class="modal-event-info">
      <div class="modal-event-label">Fecha</div>
      <div class="modal-event-val">${e.fecha}</div>
    </div>`;

  if(e.tipo==='onboarding-teo'||e.tipo==='onboarding-work'){
    html += `<div class="modal-event-info">
      <div class="modal-event-label">Cohorte</div>
      <div class="modal-event-val">${e.cohorte}</div>
    </div>`;
  }

  if(e.trent){
    const t = TEMARIO.find(x=>x.id===e.trent.temaId);
    html += `<div class="modal-event-info">
      <div class="modal-event-label">Tema</div>
      <div class="modal-event-val">${t?t.nombre:e.trent.temaId}</div>
    </div>`;
    if(e.trent.notas) html += `<div class="modal-event-info">
      <div class="modal-event-label">Notas</div>
      <div class="modal-event-val">${e.trent.notas}</div>
    </div>`;
  } else if(e.esMiercoles){
    html += `<div class="modal-event-info" style="border:1px dashed var(--dorado);background:var(--dorado-light)">
      <div class="modal-event-label" style="color:var(--dorado-dark)">Sin tema asignado</div>
      <div class="modal-event-val" style="font-size:13px;color:var(--text2)">Usá el botón + Trent para agregar el tema de esta sesión</div>
    </div>`;
  }

  html += `<div class="modal-footer">
    ${e.esMiercoles?`<button class="btn-primary" style="font-size:12px" onclick="closeModalAndAddTrent('${e.fecha}')">Editar trent</button>`:''}
    <button class="btn-secondary" onclick="closeModal()">Cerrar</button>
  </div>`;

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(ev){
  if(!ev || ev.target===document.getElementById('modal-overlay')){
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function closeModalAndAddTrent(fecha){
  closeModal();
  showAddTrent(fecha);
}

// ─ AGREGAR TRENT ─
function showAddTrent(fechaPre){
  const temaOpts = TEMARIO.map(t=>`<option value="${t.id}">${t.id} · ${t.nombre}</option>`).join('');
  // Convert fecha dd/mm/yyyy to yyyy-mm-dd for input
  let isoFecha = '';
  if(fechaPre){
    const [dd,mm,yy] = fechaPre.split('/');
    isoFecha = `${yy}-${mm}-${dd}`;
  }

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">Agregar Trent</div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Fecha (miércoles)</label>
      <input type="date" class="form-input" id="trent-fecha" value="${isoFecha}">
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Tema</label>
      <select class="form-select" id="trent-tema">
        <option value="">— Seleccionar tema —</option>
        ${temaOpts}
      </select>
    </div>
    <div class="form-group" style="margin-bottom:4px">
      <label class="form-label">Notas (opcional)</label>
      <input type="text" class="form-input" id="trent-notas" placeholder="Ej: Traer computadora">
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="guardarTrent()">Guardar</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

async function guardarTrent(){
  const fechaIso = document.getElementById('trent-fecha').value;
  const temaId   = document.getElementById('trent-tema').value;
  const notas    = document.getElementById('trent-notas').value;

  if(!fechaIso||!temaId){
    alert('Completá la fecha y el tema');
    return;
  }

  const [y,m,d] = fechaIso.split('-');
  const fecha = `${d}/${m}/${y}`;
  const uid = Math.random().toString(36).slice(2,10);
  const row = [uid, fecha, temaId, notas];

  // Guardar en Sheet
  fetch(SCRIPT_URL_CAL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({rows:[row], sheet:'Calendario_Trents'})
  }).catch(()=>{});

  // Update local state
  TRENTS = TRENTS.filter(t=>t.fecha!==fecha); // reemplazar si ya existe
  TRENTS.push({id:uid, fecha, temaId, notas});

  closeModal();
  renderCalendario();
  toast('✓ Trent guardado', 'ok');
}

// ─ LOAD TRENTS ─
async function loadTrents(){
  try {
    const rows = await sheetGet('Calendario_Trents!A2:D');
    TRENTS = rows.filter(r=>r[0]).map(r=>({
      id:r[0], fecha:r[1]||'', temaId:r[2]||'', notas:r[3]||''
    }));
  } catch(e){
    // Hoja no existe aún, se crea al primer Trent
    TRENTS = [];
  }
}
